# In Render, set the service Root Directory to `wwtd/backend` (repo root = wwtd git root).
services:
  - type: web
    name: wwtd-api
    runtime: python
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: JWT_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: CORS_ORIGINS
        value: "*"
      # Supabase: Project Settings → Database → Connection string (URI). Use Transaction pooler (port 6543) on Render.
      - key: DATABASE_URL
        sync: false
      - key: EXPOSE_DEV_OTP
        value: "false"
      # Local / fallback only — leave DATABASE_URL set in production instead.
      # - key: SQLITE_PATH
      #   value: /var/data/wwtd.db
